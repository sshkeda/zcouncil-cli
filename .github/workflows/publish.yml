name: Publish to npm

on:
  push:
    branches:
      - main
    tags:
      - "v*"

# Uses npm Trusted Publishing (OIDC) — no NPM_TOKEN needed. Prerequisite:
# the zcouncil-cli package on npm must list this workflow as a trusted
# publisher (npm.com → package → Settings → Publishing Access → GitHub
# Actions). Push to main publishes package.json's version when that version
# is not already on npm; v* tags still publish after validating the tag
# matches package.json.

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # Node 24 ships npm 11, which is required for OIDC trusted publishing.
          node-version: 24
          registry-url: https://registry.npmjs.org
      - name: Resolve publish target
        id: publish
        run: |
          name=$(node -p "require('./package.json').name")
          pkg=$(node -p "require('./package.json').version")
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tag="${GITHUB_REF_NAME#v}"
            test "$tag" = "$pkg" || (echo "tag $tag != package.json $pkg" && exit 1)
          fi

          if npm view "$name@$pkg" version >/dev/null 2>&1; then
            echo "$name@$pkg is already published; skipping npm publish."
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Smoke test
        run: |
          node bridge.mjs --version
          node bridge.mjs --help
      - name: Publish
        if: steps.publish.outputs.should_publish == 'true'
        run: npm publish --access public --provenance
