name: Publish to npm

on:
  push:
    tags:
      - "v*"

# Uses npm Trusted Publishing (OIDC) — no NPM_TOKEN needed. Prerequisite:
# the zcouncil-cli package on npm must list this workflow as a trusted
# publisher (npm.com → package → Settings → Publishing Access → GitHub
# Actions). Tag a release with `npm version patch && git push --follow-tags`.

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # Node 24 ships npm 11, which is required for OIDC trusted publishing.
          node-version: 24
          registry-url: https://registry.npmjs.org
      - name: Verify tag matches package.json version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg=$(node -p "require('./package.json').version")
          test "$tag" = "$pkg" || (echo "tag $tag != package.json $pkg" && exit 1)
      - name: Smoke test
        run: |
          node bridge.mjs --version
          node bridge.mjs --help
      - name: Publish
        run: npm publish --access public --provenance
